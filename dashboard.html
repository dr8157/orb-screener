<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORB Institutional Screener</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .animate-spin {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // SVG Icons
        const Activity = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
        );

        const RefreshCw = ({ className }) => (
            <svg className={className} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="23 4 23 10 17 10"></polyline>
                <polyline points="1 20 1 14 7 14"></polyline>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
        );

        const Settings = () => (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M12 1v6m0 6v6m6-12h-6m-6 0H0"></path>
            </svg>
        );

        const LogOut = () => (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
        );

        const Wifi = () => (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M5 12.55a11 11 0 0 1 14 0"></path>
                <path d="M8.5 16.5a5 5 0 0 1 7 0"></path>
                <circle cx="12" cy="20" r="1"></circle>
            </svg>
        );

        const WifiOff = () => (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <line x1="2" y1="2" x2="22" y2="22"></line>
                <path d="M8.5 16.5a5 5 0 0 1 7 0"></path>
                <path d="M2 8.82a15 15 0 0 1 4.17-2.65"></path>
            </svg>
        );

        const TrendingUp = ({ className }) => (
            <svg className={className} width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                <polyline points="17 6 23 6 23 12"></polyline>
            </svg>
        );

        const TrendingDown = ({ className }) => (
            <svg className={className} width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline>
                <polyline points="17 18 23 18 23 12"></polyline>
            </svg>
        );

        const AlertCircle = ({ className }) => (
            <svg className={className} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        );

        // Sparkline Component
        const Sparkline = ({ data, isPositive }) => {
            if (!data || data.length === 0) return null;
            
            const width = 80;
            const height = 30;
            const max = Math.max(...data);
            const min = Math.min(...data);
            const range = max - min || 1;
            
            const points = data.map((value, index) => {
                const x = (index / (data.length - 1)) * width;
                const y = height - ((value - min) / range) * height;
                return `${x},${y}`;
            }).join(' ');
            
            const color = isPositive ? '#00ff88' : '#ff4444';
            
            return (
                <svg width={width} height={height} style={{ display: 'inline-block' }}>
                    <polyline
                        points={points}
                        fill="none"
                        stroke={color}
                        strokeWidth="2"
                        strokeLinecap="round"
                        strokeLinejoin="round"
                    />
                </svg>
            );
        };

        // Main ORB Screener Component
        const ORBScreener = () => {
            const [stocks, setStocks] = useState([]);
            const [isLive, setIsLive] = useState(false);
            const [isConnecting, setIsConnecting] = useState(false);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [lastUpdate, setLastUpdate] = useState(new Date());
            const [isRefreshing, setIsRefreshing] = useState(false);
            const [wsConnection, setWsConnection] = useState(null);
            const [connectionError, setConnectionError] = useState(null);
            const backendUrl = 'ws://localhost:8000/ws/stream';

            // Update time every second
            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentTime(new Date());
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            // WebSocket connection
            const connectWebSocket = useCallback(() => {
                if (wsConnection?.readyState === WebSocket.OPEN) {
                    return;
                }

                setIsConnecting(true);
                setConnectionError(null);

                try {
                    const ws = new WebSocket(backendUrl);

                    ws.onopen = () => {
                        console.log('✓ Connected to ORB Backend');
                        setIsLive(true);
                        setIsConnecting(false);
                        setConnectionError(null);
                    };

                    ws.onmessage = (event) => {
                        try {
                            const data = JSON.parse(event.data);
                            
                            if (data.type === 'update' && data.signals) {
                                const formattedStocks = data.signals.map((signal, idx) => ({
                                    rank: signal.rank || idx + 1,
                                    symbol: signal.symbol,
                                    time: signal.time,
                                    dir: signal.dir,
                                    price: parseFloat(signal.price).toFixed(2),
                                    changePercent: signal.change_percent,
                                    volume: signal.volume,
                                    volumeHeat: signal.volume_heat_percent.toFixed(0),
                                    value: signal.value.toFixed(2),
                                    valueHeat: signal.value_heat_percent.toFixed(0),
                                    body: signal.body.toFixed(2),
                                    bodyHeat: signal.body_heat_percent.toFixed(0),
                                    orb: signal.orb_valid,
                                    speed: `${signal.speed_minutes}m`,
                                    pb: signal.pullback_percent.toFixed(1),
                                    decel: signal.decel_ok,
                                    score: signal.score,
                                    sparkline: signal.sparkline || []
                                }));

                                setStocks(formattedStocks);
                                setLastUpdate(new Date());
                            }
                        } catch (error) {
                            console.error('Error parsing message:', error);
                        }
                    };

                    ws.onerror = (error) => {
                        console.error('WebSocket error:', error);
                        setConnectionError('Connection error - check if backend is running');
                        setIsLive(false);
                        setIsConnecting(false);
                    };

                    ws.onclose = () => {
                        console.log('WebSocket closed');
                        setIsLive(false);
                        setIsConnecting(false);
                        
                        setTimeout(() => {
                            connectWebSocket();
                        }, 5000);
                    };

                    setWsConnection(ws);
                } catch (error) {
                    console.error('Failed to create WebSocket:', error);
                    setConnectionError('Failed to connect to backend');
                    setIsConnecting(false);
                }
            }, [wsConnection]);

            useEffect(() => {
                connectWebSocket();

                return () => {
                    if (wsConnection) {
                        wsConnection.close();
                    }
                };
            }, []);

            const formatTime = (date) => {
                return date.toLocaleTimeString('en-IN', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false 
                });
            };

            const handleRefresh = async () => {
                setIsRefreshing(true);
                
                try {
                    const response = await fetch('http://localhost:8000/api/baseline/refresh', {
                        method: 'POST'
                    });
                    
                    if (response.ok) {
                        console.log('✓ Baselines refreshed');
                    }
                } catch (error) {
                    console.error('Failed to refresh baselines:', error);
                } finally {
                    setTimeout(() => setIsRefreshing(false), 1000);
                }
            };

            const handleReconnect = () => {
                if (wsConnection) {
                    wsConnection.close();
                }
                connectWebSocket();
            };

            return (
                <div className="min-h-screen bg-black text-white font-sans">
                    {/* Top Navigation */}
                    <div className="bg-gradient-to-r from-gray-900 to-black border-b border-gray-800 px-6 py-3">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-6">
                                <div className="flex items-center gap-3">
                                    <Activity />
                                    <div>
                                        <h1 className="text-xl font-bold">ORB Institutional</h1>
                                        <p className="text-xs text-gray-400">Screener</p>
                                    </div>
                                </div>
                                
                                <div className={`flex items-center gap-2 border rounded-full px-3 py-1 ${
                                    isLive ? 'bg-green-500/10 border-green-500/30' : 
                                    isConnecting ? 'bg-yellow-500/10 border-yellow-500/30' :
                                    'bg-red-500/10 border-red-500/30'
                                }`}>
                                    {isLive ? (
                                        <>
                                            <div className="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                                            <span className="text-green-400 text-sm font-semibold">LIVE</span>
                                        </>
                                    ) : isConnecting ? (
                                        <>
                                            <div className="w-2 h-2 bg-yellow-400 rounded-full animate-pulse"></div>
                                            <span className="text-yellow-400 text-sm font-semibold">CONNECTING...</span>
                                        </>
                                    ) : (
                                        <>
                                            <WifiOff />
                                            <span className="text-red-400 text-sm font-semibold">OFFLINE</span>
                                        </>
                                    )}
                                </div>

                                {connectionError && (
                                    <div className="flex items-center gap-2 bg-red-500/10 border border-red-500/30 rounded-lg px-3 py-1">
                                        <AlertCircle className="text-red-400" />
                                        <span className="text-red-400 text-xs">{connectionError}</span>
                                        <button 
                                            onClick={handleReconnect}
                                            className="text-red-400 underline text-xs hover:text-red-300"
                                        >
                                            Reconnect
                                        </button>
                                    </div>
                                )}
                            </div>

                            <div className="flex items-center gap-2 bg-gray-800/50 rounded-lg px-4 py-2 border border-gray-700">
                                <Wifi />
                                <div className="text-right">
                                    <div className="text-xs text-gray-400">IST</div>
                                    <div className="text-sm font-mono text-white font-semibold">
                                        {formatTime(currentTime)}
                                    </div>
                                </div>
                            </div>

                            <div className="flex items-center gap-3">
                                <button
                                    onClick={handleRefresh}
                                    disabled={isRefreshing}
                                    className="flex items-center gap-2 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-lg px-4 py-2 text-sm transition-colors disabled:opacity-50"
                                >
                                    <RefreshCw className={isRefreshing ? 'animate-spin' : ''} />
                                    <span>Refresh Baselines</span>
                                </button>
                                
                                <button className="flex items-center gap-2 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-lg px-4 py-2 text-sm transition-colors">
                                    <Settings />
                                    <span>Admin</span>
                                </button>
                                
                                <button className="flex items-center gap-2 bg-red-900/20 hover:bg-red-900/30 border border-red-700/50 rounded-lg px-4 py-2 text-sm text-red-400 transition-colors">
                                    <LogOut />
                                    <span>Logout</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="p-6">
                        <div className="mb-4">
                            <h2 className="text-2xl font-bold mb-1">TOP 10 SPIKE RANKINGS</h2>
                            <p className="text-sm text-gray-500">
                                {stocks.length} signals • Last update: {formatTime(lastUpdate)} IST
                            </p>
                        </div>

                        {!isLive && stocks.length === 0 && (
                            <div className="bg-gray-900/50 border border-gray-800 rounded-lg p-8 text-center">
                                <WifiOff style={{ width: 48, height: 48, margin: '0 auto 16px', color: '#666' }} />
                                <h3 className="text-lg font-semibold text-gray-400 mb-2">Not Connected to Backend</h3>
                                <p className="text-sm text-gray-500 mb-4">
                                    Make sure the backend server is running on http://localhost:8000
                                </p>
                                <button 
                                    onClick={handleReconnect}
                                    className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm"
                                >
                                    Try Reconnecting
                                </button>
                            </div>
                        )}

                        {stocks.length > 0 && (
                            <div className="bg-gray-950 rounded-lg border border-gray-800 overflow-hidden">
                                <table className="w-full">
                                    <thead>
                                        <tr className="bg-gray-900/50 border-b border-gray-800">
                                            <th className="px-4 py-3 text-left text-xs font-semibold text-gray-400 uppercase">#</th>
                                            <th className="px-4 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Symbol</th>
                                            <th className="px-4 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Time</th>
                                            <th className="px-4 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Dir</th>
                                            <th className="px-4 py-3 text-right text-xs font-semibold text-gray-400 uppercase">Price</th>
                                            <th className="px-4 py-3 text-right text-xs font-semibold text-gray-400 uppercase">Δ%</th>
                                            <th className="px-4 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Volume</th>
                                            <th className="px-4 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Value</th>
                                            <th className="px-4 py-3 text-left text-xs font-semibold text-gray-400 uppercase">Body</th>
                                            <th className="px-4 py-3 text-center text-xs font-semibold text-gray-400 uppercase">ORB</th>
                                            <th className="px-4 py-3 text-center text-xs font-semibold text-gray-400 uppercase">Speed</th>
                                            <th className="px-4 py-3 text-center text-xs font-semibold text-gray-400 uppercase">PB</th>
                                            <th className="px-4 py-3 text-center text-xs font-semibold text-gray-400 uppercase">Decel</th>
                                            <th className="px-4 py-3 text-left text-xs font-semibold text-gray-400 uppercase"></th>
                                            <th className="px-4 py-3 text-right text-xs font-semibold text-gray-400 uppercase">Score</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {stocks.map((stock) => (
                                            <tr key={stock.symbol} className="border-b border-gray-800/50 hover:bg-gray-900/30 transition-colors">
                                                <td className="px-4 py-4">
                                                    <span className="text-gray-500 font-mono text-sm">{stock.rank}</span>
                                                </td>
                                                <td className="px-4 py-4">
                                                    <span className="text-white font-bold text-sm">{stock.symbol}</span>
                                                </td>
                                                <td className="px-4 py-4">
                                                    <span className="text-gray-400 font-mono text-xs">{stock.time}</span>
                                                </td>
                                                <td className="px-4 py-4">
                                                    <span className={`inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold ${
                                                        stock.dir === 'LONG' 
                                                            ? 'bg-green-500/20 text-green-400 border border-green-500/30' 
                                                            : 'bg-red-500/20 text-red-400 border border-red-500/30'
                                                    }`}>
                                                        {stock.dir === 'LONG' ? <TrendingUp /> : <TrendingDown />}
                                                        {stock.dir}
                                                    </span>
                                                </td>
                                                <td className="px-4 py-4 text-right">
                                                    <span className="text-white font-mono text-sm">₹{parseFloat(stock.price).toLocaleString('en-IN')}</span>
                                                </td>
                                                <td className="px-4 py-4 text-right">
                                                    <span className={`font-mono font-bold text-sm ${
                                                        stock.changePercent >= 0 ? 'text-green-400' : 'text-red-400'
                                                    }`}>
                                                        {stock.changePercent >= 0 ? '+' : ''}{stock.changePercent.toFixed(2)}%
                                                    </span>
                                                </td>
                                                <td className="px-4 py-4">
                                                    <div>
                                                        <div className="text-white font-semibold text-sm">{stock.volume}</div>
                                                        <div className="text-green-400 text-xs font-mono">+{parseFloat(stock.volumeHeat).toLocaleString()}%</div>
                                                    </div>
                                                </td>
                                                <td className="px-4 py-4">
                                                    <div>
                                                        <div className="text-white font-semibold text-sm">{stock.value}Cr</div>
                                                        <div className="text-green-400 text-xs font-mono">+{stock.valueHeat}%</div>
                                                    </div>
                                                </td>
                                                <td className="px-4 py-4">
                                                    <div>
                                                        <div className="text-white font-semibold text-sm">{stock.body}x</div>
                                                        <div className="text-green-400 text-xs font-mono">+{stock.bodyHeat}%</div>
                                                    </div>
                                                </td>
                                                <td className="px-4 py-4 text-center">
                                                    {stock.orb ? (
                                                        <div className="inline-flex items-center justify-center w-6 h-6 rounded bg-green-500/20 text-green-400 border border-green-500/30">
                                                            <span className="text-lg leading-none">✓</span>
                                                        </div>
                                                    ) : (
                                                        <div className="inline-flex items-center justify-center w-6 h-6 rounded bg-gray-700/20 text-gray-600">
                                                            <span className="text-lg leading-none">✗</span>
                                                        </div>
                                                    )}
                                                </td>
                                                <td className="px-4 py-4 text-center">
                                                    <span className="text-gray-300 font-mono text-sm">{stock.speed}</span>
                                                </td>
                                                <td className="px-4 py-4 text-center">
                                                    <span className="text-gray-300 font-mono text-sm">{stock.pb}%</span>
                                                </td>
                                                <td className="px-4 py-4 text-center">
                                                    {stock.decel ? (
                                                        <div className="inline-flex items-center justify-center w-6 h-6 rounded bg-green-500/20 text-green-400 border border-green-500/30">
                                                            <span className="text-lg leading-none">✓</span>
                                                        </div>
                                                    ) : (
                                                        <div className="inline-flex items-center justify-center w-6 h-6 rounded bg-gray-700/20 text-gray-600">
                                                            <span className="text-lg leading-none">✗</span>
                                                        </div>
                                                    )}
                                                </td>
                                                <td className="px-4 py-4">
                                                    <Sparkline data={stock.sparkline} isPositive={stock.changePercent >= 0} />
                                                </td>
                                                <td className="px-4 py-4 text-right">
                                                    <div className={`inline-flex items-center justify-center w-12 h-12 rounded-lg font-bold text-xl ${
                                                        stock.score >= 90 ? 'bg-green-500/20 text-green-400 border-2 border-green-500' :
                                                        stock.score >= 80 ? 'bg-green-500/10 text-green-400 border border-green-500/50' :
                                                        stock.score >= 70 ? 'bg-yellow-500/10 text-yellow-400 border border-yellow-500/50' :
                                                        'bg-gray-700/20 text-gray-400 border border-gray-600'
                                                    }`}>
                                                        {stock.score}
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        <div className="mt-6 flex items-center gap-8 text-xs text-gray-500">
                            <div className="flex items-center gap-2">
                                <div className="w-3 h-3 rounded-full bg-green-400"></div>
                                <span>Long Position</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="w-3 h-3 rounded-full bg-red-400"></div>
                                <span>Short Position</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="w-3 h-3 rounded-full bg-green-500/30 border border-green-500"></div>
                                <span>ORB Valid / Decel OK</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <span className="font-mono">L = Lakhs</span>
                                <span>•</span>
                                <span className="font-mono">Cr = Crores</span>
                            </div>
                            {!isLive && (
                                <div className="flex items-center gap-2 text-yellow-400">
                                    <AlertCircle />
                                    <span>Backend: http://localhost:8000</span>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Render app
        ReactDOM.render(<ORBScreener />, document.getElementById('root'));
    </script>
</body>
</html>
